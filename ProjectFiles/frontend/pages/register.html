<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - Customer Registry</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .section-box { background: white; border-radius: 8px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #0d6efd; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-5">
    <div class="container"><span class="navbar-brand mb-0 h1">Customer Registry System</span></div>
  </nav>

  <div class="container mt-5">
    <div class="section-box w-50 mx-auto">
      <h4 class="mb-3">Register Account</h4>
      <hr>
      <form id="register-form" class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Name</label>
          <input type="text" id="reg-name" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" id="reg-email" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Password</label>
          <input type="password" id="reg-password" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Role Request</label>
          <select id="reg-role" class="form-select">
            <option value="Customer">Customer</option>
            <option value="Agent">Agent</option>
            <option value="Admin">Admin</option>
          </select>
        </div>
        <div class="col-12 mt-4">
          <button type="submit" class="btn btn-success w-100">Create Profile</button>
        </div>
        <div class="col-12 text-center mt-2">
          <small>Already have an account? <a href="login.html">Login here</a></small>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const userData = {
        name: document.getElementById('reg-name').value,
        email: document.getElementById('reg-email').value,
        password: document.getElementById('reg-password').value,
        role: document.getElementById('reg-role').value
      };

      try {
        const response = await fetch('https://customer-registry-taxu.onrender.com/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(userData)
        });

        const data = await response.json();

        if (response.ok) {
          alert('Registration successful! Please login.');
          window.location.href = 'login.html'; 
        } else {
          alert('Error: ' + data.message);
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Could not connect to the server. Is your backend running?');
      }
    });
  </script>
</body>
</html>
