<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .section-box { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #0d6efd; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
      <span class="navbar-brand mb-0 h1" id="user-greeting">Customer Dashboard</span>
      <button id="logout-btn" class="btn btn-sm btn-light">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="section-box">
      <h4>Raise a New Ticket</h4>
      <form id="ticket-form" class="row mt-3">
        <div class="col-md-4 mb-3">
          <label class="form-label">Ticket Type</label>
          <select id="ticket-type" class="form-select" required>
            <option value="Complaint">Complaint</option>
            <option value="Inquiry">Inquiry</option>
            <option value="Feedback">Feedback</option>
            <option value="Request">Request</option>
          </select>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Priority</label>
          <select id="ticket-priority" class="form-select" required>
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
            <option value="Critical">Critical</option>
          </select>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Title</label>
          <input type="text" id="ticket-title" class="form-control" placeholder="Brief issue summary" required>
        </div>
        <div class="col-12 mb-3">
          <label class="form-label">Description</label>
          <textarea id="ticket-desc" class="form-control" rows="2" placeholder="Provide detailed information..." required></textarea>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary">Submit Ticket</button>
        </div>
      </form>
    </div>

    <div class="section-box">
      <h4>My Ticket History</h4>
      <table class="table table-striped mt-3">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Status</th>
            <th>Agent</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ticket-list">
          <tr><td colspan="5" class="text-center text-muted">Loading tickets...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      if (!token) {
        alert('You must be logged in to view this page.');
        window.location.href = 'login.html';
        return;
      }

      const userName = localStorage.getItem('userName');
      if (userName) {
        document.getElementById('user-greeting').textContent = `Welcome, ${userName}`;
      }

      async function fetchTickets() {
        try {
          const response = await fetch('http://localhost:5000/api/complaints', {
            method: 'GET',
            headers: {
              'Authorization': `Bearer ${token}` 
            }
          });

          const tickets = await response.json();
          const ticketList = document.getElementById('ticket-list');
          ticketList.innerHTML = ''; 

          if (tickets.length === 0) {
            ticketList.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No tickets found. Raise one above!</td></tr>';
            return;
          }

          tickets.forEach(ticket => {
            let badgeColor = 'bg-primary';
            if (ticket.status === 'Resolved' || ticket.status === 'Closed') badgeColor = 'bg-success';
            if (ticket.status === 'In Progress') badgeColor = 'bg-warning text-dark';
            
            const agentName = ticket.assignedAgent ? ticket.assignedAgent.name : 'Unassigned';

            ticketList.innerHTML += `
              <tr>
                <td><strong>${ticket.ticketId}</strong></td>
                <td>${ticket.type}</td>
                <td><span class="badge ${badgeColor}">${ticket.status}</span></td>
                <td>${agentName}</td>
                <td><a href="ticket-detail.html?id=${ticket._id}" class="btn btn-sm btn-outline-primary">View Ticket</a></td>
              </tr>
            `;
          });
        } catch (error) {
          console.error('Error fetching tickets:', error);
          document.getElementById('ticket-list').innerHTML = '<tr><td colspan="5" class="text-center text-danger">Failed to load tickets.</td></tr>';
        }
      }

      fetchTickets();

      document.getElementById('ticket-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const newTicket = {
          type: document.getElementById('ticket-type').value,
          priority: document.getElementById('ticket-priority').value,
          title: document.getElementById('ticket-title').value,
          description: document.getElementById('ticket-desc').value
        };

        try {
          const response = await fetch('http://localhost:5000/api/complaints', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(newTicket)
          });

          if (response.ok) {
            alert('Ticket submitted successfully!');
            document.getElementById('ticket-form').reset();
            fetchTickets();
          } else {
            const data = await response.json();
            alert('Error submitting ticket: ' + data.message);
          }
        } catch (error) {
          console.error('Error:', error);
          alert('Could not connect to the server.');
        }
      });

      document.getElementById('logout-btn').addEventListener('click', () => {
        localStorage.clear();
        window.location.href = 'login.html';
      });
    });
  </script>
</body>
</html>
