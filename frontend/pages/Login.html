<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Customer Registry</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .section-box { background: white; border-radius: 8px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #0d6efd; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-5">
    <div class="container"><span class="navbar-brand mb-0 h1">Customer Registry System</span></div>
  </nav>

  <div class="container mt-5">
    <div class="section-box w-50 mx-auto">
      <h4 class="mb-3">Login</h4>
      <hr>
      <form id="login-form">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" id="login-email" class="form-control" placeholder="user@email.com" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" id="login-password" class="form-control" placeholder="********" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
        <div class="text-center">
          <small>Don't have an account? <a href="register.html">Register here</a></small>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault(); 

      const loginData = {
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value
      };

      try {
        const response = await fetch('http://localhost:5000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(loginData)
        });

        const data = await response.json();

        if (response.ok) {
          alert('Login successful!');
          
          localStorage.setItem('token', data.token);
          localStorage.setItem('userRole', data.role);
          localStorage.setItem('userName', data.name);

          if (data.role === 'Admin') {
            window.location.href = 'admin-dashboard.html';
          } else if (data.role === 'Agent') {
            window.location.href = 'agent-dashboard.html';
          } else {
            window.location.href = 'customer-dashboard.html';
          }
        } else {
          alert('Login failed: ' + data.message);
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Could not connect to the server. Is your backend running?');
      }
    });
  </script>
</body>
</html>
